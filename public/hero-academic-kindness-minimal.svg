<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Minimal academic hero illustration</title>
  <desc id="desc">A minimal academic scene with books, chart lines, and kindness symbol in calm research colors.</desc>
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E5ED8"/>
      <stop offset="1" stop-color="#6B8FF0"/>
    </linearGradient>
    <linearGradient id="kind" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D39A24"/>
      <stop offset="1" stop-color="#E6C168"/>
    </linearGradient>
  </defs>

  <rect x="120" y="120" width="1360" height="660" rx="32" fill="none" stroke="#DCE6FF"/>

  <text x="220" y="250" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="700" fill="#183E86">Academic Research</text>
  <text x="220" y="310" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="500" fill="#3A5FA8">with Clarity, Evidence, and Kindness</text>

  <line x1="220" y1="355" x2="1380" y2="355" stroke="#E4ECFF" stroke-width="2"/>

  <!-- Left: books -->
  <rect x="240" y="470" width="260" height="24" rx="12" fill="#2B4F9F"/>
  <rect x="240" y="504" width="300" height="24" rx="12" fill="#416AC1"/>
  <rect x="240" y="538" width="280" height="24" rx="12" fill="#5B82D5"/>

  <!-- Center: chart -->
  <polyline points="660,560 750,500 830,525 920,455 1010,485" fill="none" stroke="url(#ink)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="660" cy="560" r="9" fill="#2E5ED8"/>
  <circle cx="750" cy="500" r="9" fill="#2E5ED8"/>
  <circle cx="830" cy="525" r="9" fill="#2E5ED8"/>
  <circle cx="920" cy="455" r="9" fill="#2E5ED8"/>
  <circle cx="1010" cy="485" r="9" fill="#2E5ED8"/>

  <!-- Right: kindness mark -->
  <path d="M1240 570C1208 540 1165 520 1165 482C1165 451 1188 428 1217 428C1236 428 1252 437 1264 452C1276 437 1292 428 1311 428C1340 428 1363 451 1363 482C1363 520 1320 540 1288 570L1264 594L1240 570Z" fill="url(#kind)"/>
  <path d="M1264 426L1273 444L1293 447L1278 460L1282 480L1264 470L1246 480L1250 460L1235 447L1255 444L1264 426Z" fill="#FFF6E2"/>

  <text x="800" y="730" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" fill="#234B95">Learning with rigor • Building with empathy</text>
</svg>
