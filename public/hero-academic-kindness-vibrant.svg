<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vibrant academic research hero</title>
  <desc id="desc">A vibrant scholarly scene with abstract research forms, collaboration icons, and kindness motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F2D6A"/>
      <stop offset="1" stop-color="#1E4FAF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8FB1FF"/>
      <stop offset="1" stop-color="#C6D8FF"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2C25B"/>
      <stop offset="1" stop-color="#DFA233"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="140" r="220" fill="#6F95F9" fill-opacity="0.35"/>
  <circle cx="180" cy="780" r="240" fill="#88A8FF" fill-opacity="0.25"/>

  <rect x="110" y="110" width="1380" height="680" rx="36" fill="url(#card)" stroke="#9DB9FF" stroke-opacity="0.5"/>

  <text x="220" y="255" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800" fill="#FFFFFF">Academic. Research. Kindness.</text>
  <text x="220" y="315" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="500" fill="#D8E4FF">Progressive learning, evidence-led building, human-centered impact.</text>

  <!-- Abstract research panels -->
  <rect x="220" y="380" width="360" height="290" rx="24" fill="#FFFFFF" fill-opacity="0.12" stroke="#C1D4FF"/>
  <rect x="620" y="380" width="360" height="290" rx="24" fill="#FFFFFF" fill-opacity="0.12" stroke="#C1D4FF"/>
  <rect x="1020" y="380" width="360" height="290" rx="24" fill="#FFFFFF" fill-opacity="0.12" stroke="#E9D3A4"/>

  <!-- Left panel books -->
  <rect x="260" y="560" width="210" height="20" rx="10" fill="#9FC0FF"/>
  <rect x="260" y="588" width="250" height="20" rx="10" fill="#B8D0FF"/>
  <rect x="260" y="616" width="228" height="20" rx="10" fill="#D0E0FF"/>
  <text x="260" y="450" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#EAF1FF">Knowledge Base</text>

  <!-- Center panel chart -->
  <polyline points="660,620 730,560 800,590 870,505 940,535" fill="none" stroke="url(#a)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="660" cy="620" r="8" fill="#C7D9FF"/>
  <circle cx="730" cy="560" r="8" fill="#C7D9FF"/>
  <circle cx="800" cy="590" r="8" fill="#C7D9FF"/>
  <circle cx="870" cy="505" r="8" fill="#C7D9FF"/>
  <circle cx="940" cy="535" r="8" fill="#C7D9FF"/>
  <text x="660" y="450" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#EAF1FF">Research Signals</text>

  <!-- Right panel kindness -->
  <path d="M1155 610C1125 582 1086 562 1086 526C1086 497 1108 476 1135 476C1153 476 1168 485 1179 499C1190 485 1205 476 1223 476C1250 476 1272 497 1272 526C1272 562 1233 582 1203 610L1179 632L1155 610Z" fill="url(#g)"/>
  <circle cx="1286" cy="545" r="14" fill="#F3CB73"/>
  <circle cx="1320" cy="567" r="14" fill="#F3CB73"/>
  <circle cx="1252" cy="567" r="14" fill="#F3CB73"/>
  <rect x="1236" y="592" width="100" height="14" rx="7" fill="#F3CB73"/>
  <text x="1060" y="450" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#FFF4DC">Kind Collaboration</text>

  <text x="800" y="742" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" fill="#E6EEFF">Scholarship that is rigorous, collaborative, and compassionate</text>
</svg>
